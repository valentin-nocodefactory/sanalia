<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<script type="application/ld+json">

  "itemListElement": [
    {"@type": "ListItem", "position": 1, "name": "Accueil", "item": "https://www.sanalia.fr/"},
    {"@type": "ListItem", "position": 2, "name": "Merci"}

<link rel="stylesheet" href="/tokens.css">
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/components.css">
<style>
/* ═══ MERCI PAGE STYLES ═══ */
.merci-section {
  padding: var(--space-3xl) 0;
  background: var(--color-bg);
  min-height: 60vh;
  display: flex;
  align-items: center;
}
.merci-content {
  max-width: 640px;
  margin: 0 auto;
  text-align: center;
}
.merci-icon {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: var(--color-primary-100);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  margin: 0 auto var(--space-lg);
}
.merci-title {
  font-family: 'Uxum', sans-serif;
  font-weight: 700;
  font-size: 2.25rem;
  color: var(--color-primary-900);
  margin-bottom: var(--space-sm);
}
.merci-subtitle {
  font-family: 'Uxum', sans-serif;
  font-weight: 400;
  font-size: 1.125rem;
  color: var(--color-primary-800);
  margin-bottom: var(--space-2xl);
}
.merci-reassurance {
  background: var(--color-surface);
  border-radius: var(--radius-lg);
  padding: var(--space-xl);
  margin-bottom: var(--space-xl);
  box-shadow: 0 2px 12px rgba(14,5,42,0.06);
}
.merci-reassurance-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-md);
}
@media (max-width: 480px) {
  .merci-reassurance-grid {
    grid-template-columns: 1fr;
  }
  .merci-title {
    font-size: 1.5rem;
  }
}
.merci-reassurance-item {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  font-family: 'Uxum', sans-serif;
  font-weight: 400;
  font-size: 0.9375rem;
  color: var(--color-primary-800);
}
.merci-reassurance-item span {
  flex-shrink: 0;
  width: 36px;
  height: 36px;
  border-radius: var(--radius-md);
  background: var(--color-primary-100);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.125rem;
}
.merci-actions {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-md);
}
.merci-phone {
  font-family: 'Uxum', sans-serif;
  font-weight: 400;
  font-size: 0.9375rem;
  color: var(--color-primary-800);
}
.merci-phone a {
  font-weight: 700;
  color: var(--color-primary-900);
  text-decoration: none;
}
</style>
</head>
<body>

<div data-component="header"></div>

<!-- ════════ MERCI ════════ -->
<section class="merci-section">
  <div class="container">
    <div class="merci-content">

      <div class="merci-icon">✅</div>

      <h1 class="merci-title">Merci, nous avons bien reçu votre demande !</h1>
      <p class="merci-subtitle">Un technicien vous rappelle sous 2h.</p>

      <div class="merci-reassurance">
        <div class="merci-reassurance-grid">
          <div class="merci-reassurance-item">
            <span>📞</span>
            <div>Rappel sous 2h</div>
          </div>
          <div class="merci-reassurance-item">
            <span>📋</span>
            <div>Devis détaillé gratuit</div>
          </div>
          <div class="merci-reassurance-item">
            <span>🛡️</span>
            <div>Résultat garanti</div>
          </div>
          <div class="merci-reassurance-item">
            <span>⚡</span>
            <div>Intervention rapide</div>
          </div>
        </div>
      </div>

      <div class="merci-actions">
        <a href="/" class="btn btn-primary btn-lg">Retour à l'accueil</a>
        <p class="merci-phone">Besoin urgent ? Appelez-nous au <a href="tel:0667464897">06 67 46 48 97</a> (8h-20h)</p>
      </div>

    </div>
  </div>
</section>

<div data-component="certifications"></div>

<div data-component="footer"></div>

<div data-component="mobile-sticky-cta"></div>

<script src="/js/app.js"></script>
</body>
</html>
