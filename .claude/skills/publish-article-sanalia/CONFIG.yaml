# Config skill publish-article-sanalia
# Source de vérité unique pour les constantes utilisées par tous les scripts.
# Modifier ici plutôt que de hard-coder dans les scripts.

# ──────────────────────────────────────────────
# Identifiants externes
# ──────────────────────────────────────────────
github_repo: valentin-nocodefactory/sanalia
notion_data_source_id: 4fc6d199-2674-494a-8959-ba1008034526
chatseo_site_id: 360b07f1-8f98-4035-8e5e-6d55d7a1285a
cloudflare_project: sanalia
cloudflare_pages_domain: sanalia.pages.dev
prod_domain: https://www.sanalia.fr

# ──────────────────────────────────────────────
# Chemins repo (relatifs à la racine git)
# ──────────────────────────────────────────────
paths:
  blog_root: blog
  assets_blog_root: assets/blog
  assets_nuisibles_root: assets/nuisibles
  sitemap_main: sitemap.xml
  sitemap_blog: sitemap-blog.xml
  sitemap_index: sitemap-index.xml
  feed_xml: blog/feed.xml
  blog_hub: blog/index.html
  build_script: build.sh
  skeleton_template: .claude/skills/publish-article-sanalia/templates/article-skeleton.html

# ──────────────────────────────────────────────
# Statuts Notion (machine d'état)
# ──────────────────────────────────────────────
notion_statuses:
  to_process: "Next up"
  in_progress: "In progress"
  to_validate: "À valider"
  validated: "Validé"
  published: "Publié"
  error: "Erreur"

# ──────────────────────────────────────────────
# Mapping Intent → CTA variant
# ──────────────────────────────────────────────
intent_to_cta_variant:
  informational: devis
  prevention: devis
  urgency: urgence
  transactional: urgence
  regulatory: guide

# ──────────────────────────────────────────────
# CTA templates par variant
# Le skill génère 3 CTAs inline aux positions 25/50/80% du contenu.
# ──────────────────────────────────────────────
cta_templates:
  devis:
    href: /devis/
    button_text: "Obtenir mon devis gratuit"
    titles:
      - "Besoin d'un diagnostic par un technicien Certibiocide ?"
      - "Prêt à en finir avec ce problème ?"
      - "Un devis gratuit en 2 minutes"
    descs:
      - "Devis gratuit sous 2 heures, intervention possible le jour même à Lyon et Paris."
      - "Diagnostic offert, devis transparent sous 2 heures, intervention garantie résultat."
      - "Technicien Certibiocide, intervention sous 24 h, résultat garanti."
  urgence:
    href: tel:0667464897
    button_text: "Appeler maintenant"
    titles:
      - "Besoin d'une intervention aujourd'hui ?"
      - "Situation urgente ?"
      - "Un technicien tout de suite ?"
    descs:
      - "Intervention d'urgence 8h-20h, 7j/7. Un technicien peut être chez vous dans les 4 heures à Lyon et Paris."
      - "Notre équipe peut intervenir dans la journée. 8h-20h, 7j/7."
      - "06 67 46 48 97 — réponse immédiate, intervention rapide."
  guide:
    href: /devis/
    button_text: "Demander un audit gratuit"
    titles:
      - "Vous devez vous mettre en conformité ?"
      - "Audit de conformité gratuit"
      - "Sécurisez votre obligation légale"
    descs:
      - "Nos experts vous accompagnent dans la mise en conformité réglementaire. Audit offert."
      - "Audit personnalisé de vos obligations, rapport détaillé, plan d'action sur mesure."
      - "Toutes les certifications requises, accompagnement clé en main."

