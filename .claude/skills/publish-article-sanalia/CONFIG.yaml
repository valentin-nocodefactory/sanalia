    section: "Dépigeonnage"

# ──────────────────────────────────────────────
# Recraft preset "editorial sage green Sanalia"
# Préfixé / suffixé sur tous les prompts ChatSEO
# ──────────────────────────────────────────────
recraft:
  hero_size: "1820x1024"        # ratio ~16:9 proche de 1200x630 (rééchantillonné côté front)
  inline_size: "1456x816"       # 16:9 standard pour illustrations H2
  hero_model: recraftv3
  hero_style: editorial_illustration
  inline_model: recraftv3
  inline_style: editorial_illustration
  prompt_suffix: ", Sanalia brand aesthetic: warm cream background (#F6F5F0), accents of soft sage green and dusty lavender, editorial illustration style with subtle textures, modern minimal composition, no text labels, no logos, no people faces, clean and reassuring tone"

# ──────────────────────────────────────────────
# Slack notification
# ──────────────────────────────────────────────
slack:
  env_var: SLACK_WEBHOOK_URL
  message_template_draft: |
    ✅ *Article Sanalia prêt à valider*
    • Titre : {title}
    • Mot-clé : {keyword}
    • Preview : {preview_url}
    • PR : {pr_url}
    • Notion : {notion_url}

    Quand tu es ok, change le statut Notion en *Validé* — la 2ème routine s'occupera du merge.
  message_template_published: |
    🚀 *Article Sanalia publié en prod*
    • Titre : {title}
    • URL prod : {prod_url}
    • Notion : {notion_url}
  message_template_error: |
    ⚠️ *Erreur publication article Sanalia*
    • Article : {title}
    • Étape : {step}
    • Erreur : {error}
    • Notion : {notion_url}
