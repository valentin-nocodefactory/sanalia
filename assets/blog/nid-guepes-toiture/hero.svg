<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Nid de guêpes dans la charpente d'une toiture — illustration éditoriale Sanalia">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFDF8"/>
      <stop offset="100%" stop-color="#F6F5F0"/>
    </linearGradient>
    <linearGradient id="woodGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A96A"/>
      <stop offset="100%" stop-color="#B8864A"/>
    </linearGradient>
    <linearGradient id="nestGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8DDD0"/>
      <stop offset="100%" stop-color="#C9B99A"/>
    </linearGradient>
    <filter id="nestShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="8" stdDeviation="12" flood-color="#8B6040" flood-opacity="0.3"/>
    </filter>
    <filter id="beamShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#5A3A1A" flood-opacity="0.25"/>
    </filter>
    <radialGradient id="lightGrad" cx="50%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#FFF8E8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#F6F5F0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="alertGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F66C24" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F66C24" stop-opacity="0"/>
    </radialGradient>
    <pattern id="honeycomb" x="0" y="0" width="30" height="26" patternUnits="userSpaceOnUse">
      <polygon points="15,2 28,9 28,22 15,29 2,22 2,9" fill="none" stroke="#B8A888" stroke-width="1.2" opacity="0.6"/>
      <polygon points="15,5 25,10.5 25,21.5 15,27 5,21.5 5,10.5" fill="#E8DDD0" opacity="0.35"/>
    </pattern>
  </defs>

  <!-- Fond -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#lightGrad)"/>

  <!-- Ombre sol combles -->
  <ellipse cx="600" cy="590" rx="500" ry="120" fill="#D8CCB8" opacity="0.3"/>

  <!-- CHARPENTE -->
  <!-- Faîtage -->
  <rect x="0" y="88" width="1200" height="28" rx="4" fill="url(#woodGrad)" filter="url(#beamShadow)"/>
  <rect x="0" y="88" width="1200" height="6" rx="2" fill="#E8C07A" opacity="0.45"/>
  <line x1="80" y1="90" x2="220" y2="114" stroke="#A06030" stroke-width="1" opacity="0.3"/>
  <line x1="350" y1="92" x2="490" y2="112" stroke="#A06030" stroke-width="1" opacity="0.3"/>
  <line x1="650" y1="90" x2="820" y2="113" stroke="#A06030" stroke-width="1" opacity="0.3"/>
  <line x1="920" y1="91" x2="1080" y2="114" stroke="#A06030" stroke-width="1" opacity="0.3"/>

  <!-- Chevron gauche -->
  <polygon points="600,116 50,490 92,506 628,136" fill="url(#woodGrad)" filter="url(#beamShadow)"/>
  <polygon points="600,116 628,136 624,126 608,116" fill="#E0B870" opacity="0.55"/>

  <!-- Chevron droit -->
  <polygon points="600,116 1150,490 1108,506 572,136" fill="url(#woodGrad)" filter="url(#beamShadow)"/>
  <polygon points="600,116 572,136 576,126 592,116" fill="#E0B870" opacity="0.55"/>

  <!-- Poinçon vertical -->
  <rect x="583" y="116" width="34" height="215" rx="3" fill="url(#woodGrad)" filter="url(#beamShadow)"/>
  <rect x="583" y="116" width="8" height="215" rx="2" fill="#E8C07A" opacity="0.38"/>

  <!-- Contre-fiches -->
  <line x1="583" y1="200" x2="195" y2="408" stroke="#B8864A" stroke-width="18" stroke-linecap="round" opacity="0.8"/>
  <line x1="617" y1="200" x2="1005" y2="408" stroke="#B8864A" stroke-width="18" stroke-linecap="round" opacity="0.8"/>

  <!-- Entraits -->
  <rect x="48" y="395" width="476" height="20" rx="3" fill="url(#woodGrad)" filter="url(#beamShadow)" transform="rotate(-2, 286, 405)"/>
  <rect x="676" y="395" width="476" height="20" rx="3" fill="url(#woodGrad)" filter="url(#beamShadow)" transform="rotate(2, 914, 405)"/>

  <!-- Liteaux -->
  <rect x="95" y="215" width="345" height="9" rx="2" fill="#C8944E" opacity="0.65" transform="rotate(-34, 268, 219)"/>
  <rect x="100" y="295" width="388" height="9" rx="2" fill="#C8944E" opacity="0.65" transform="rotate(-34, 294, 299)"/>
  <rect x="760" y="215" width="345" height="9" rx="2" fill="#C8944E" opacity="0.65" transform="rotate(34, 933, 219)"/>
  <rect x="712" y="295" width="388" height="9" rx="2" fill="#C8944E" opacity="0.65" transform="rotate(34, 906, 299)"/>

  <!-- NID DE GUÊPES -->
  <!-- Halo urgence -->
  <ellipse cx="600" cy="312" rx="182" ry="162" fill="url(#alertGrad)"/>

  <!-- Corps principal du nid -->
  <ellipse cx="600" cy="318" rx="145" ry="130" fill="url(#nestGrad)" filter="url(#nestShadow)"/>
  <ellipse cx="600" cy="318" rx="145" ry="130" fill="url(#honeycomb)"/>

  <!-- Couches papier mâché -->
  <ellipse cx="600" cy="210" rx="52" ry="16" fill="none" stroke="#C9B99A" stroke-width="2.5" opacity="0.7"/>
  <ellipse cx="600" cy="224" rx="72" ry="24" fill="none" stroke="#BFB090" stroke-width="2.5" opacity="0.68"/>
  <ellipse cx="600" cy="244" rx="96" ry="32" fill="none" stroke="#B5A486" stroke-width="2.5" opacity="0.65"/>
  <ellipse cx="600" cy="268" rx="118" ry="40" fill="none" stroke="#AB987C" stroke-width="2.5" opacity="0.62"/>
  <ellipse cx="600" cy="295" rx="136" ry="49" fill="none" stroke="#A18C72" stroke-width="2" opacity="0.58"/>
  <ellipse cx="600" cy="325" rx="143" ry="57" fill="none" stroke="#978068" stroke-width="2" opacity="0.54"/>
  <ellipse cx="600" cy="358" rx="140" ry="57" fill="none" stroke="#8D745E" stroke-width="2" opacity="0.5"/>
  <ellipse cx="600" cy="390" rx="125" ry="48" fill="none" stroke="#836854" stroke-width="2" opacity="0.45"/>
  <ellipse cx="600" cy="416" rx="102" ry="38" fill="none" stroke="#795C4A" stroke-width="1.8" opacity="0.4"/>
  <ellipse cx="600" cy="436" rx="74" ry="27" fill="none" stroke="#6F5040" stroke-width="1.8" opacity="0.35"/>
  <ellipse cx="600" cy="447" rx="44" ry="15" fill="none" stroke="#654436" stroke-width="1.5" opacity="0.3"/>

  <!-- Entrée -->
  <ellipse cx="600" cy="451" rx="20" ry="9" fill="#5A3A28" opacity="0.65"/>
  <ellipse cx="600" cy="449" rx="14" ry="6" fill="#3A2018" opacity="0.5"/>

  <!-- Attache poinçon -->
  <path d="M 589 193 C 591 168 594 148 600 116" stroke="#A08060" stroke-width="4" fill="none" opacity="0.55"/>
  <path d="M 611 193 C 609 168 606 148 600 116" stroke="#A08060" stroke-width="4" fill="none" opacity="0.55"/>
  <ellipse cx="600" cy="193" rx="16" ry="7" fill="#C8A878" opacity="0.55"/>

  <!-- GUÊPES EN VOL -->
  <!-- Guêpe 1 — entrée du nid -->
  <g transform="translate(568, 440) rotate(-20)">
    <ellipse cx="0" cy="0" rx="13" ry="6.5" fill="#F5C842"/>
    <rect x="-8" y="-6.5" width="5.5" height="13" rx="2" fill="#1A1A1A" opacity="0.85"/>
    <rect x="1" y="-6.5" width="5" height="13" rx="2" fill="#1A1A1A" opacity="0.85"/>
    <circle cx="-15" cy="0" r="5" fill="#1A1A1A"/>
    <ellipse cx="-17" cy="-2" rx="2" ry="1.4" fill="#F5C842" opacity="0.7"/>
    <ellipse cx="2" cy="-11" rx="12" ry="4.5" fill="#CECCFC" opacity="0.55" transform="rotate(-15, 2, -11)"/>
    <ellipse cx="8" cy="-9" rx="10" ry="3.5" fill="#CECCFC" opacity="0.4" transform="rotate(-8, 8, -9)"/>
    <line x1="13" y1="0" x2="21" y2="3" stroke="#5A3A28" stroke-width="1.5"/>
  </g>

  <!-- Guêpe 2 — en vol gauche -->
  <g transform="translate(405, 265) rotate(8)">
    <ellipse cx="0" cy="0" rx="15" ry="7.5" fill="#F5C842"/>
    <rect x="-9" y="-7.5" width="6.5" height="15" rx="2" fill="#1A1A1A" opacity="0.85"/>
    <rect x="2" y="-7.5" width="5.5" height="15" rx="2" fill="#1A1A1A" opacity="0.85"/>
    <circle cx="-17" cy="0" r="5.5" fill="#1A1A1A"/>
    <ellipse cx="-19" cy="-2" rx="2.2" ry="1.6" fill="#F5C842" opacity="0.7"/>
    <ellipse cx="3" cy="-13" rx="13" ry="5" fill="#CECCFC" opacity="0.58" transform="rotate(-18, 3, -13)"/>
    <ellipse cx="10" cy="-10" rx="11" ry="4" fill="#CECCFC" opacity="0.43" transform="rotate(-10, 10, -10)"/>
    <line x1="15" y1="0" x2="24" y2="3" stroke="#5A3A28" stroke-width="1.5"/>
  </g>

  <!-- Guêpe 3 — en vol droit -->
  <g transform="translate(808, 285) rotate(-12) scale(-1,1)">
    <ellipse cx="0" cy="0" rx="14" ry="7" fill="#F5C842"/>
    <rect x="-8" y="-7" width="6" height="14" rx="2" fill="#1A1A1A" opacity="0.85"/>
    <rect x="1.5" y="-7" width="5" height="14" rx="2" fill="#1A1A1A" opacity="0.85"/>
    <circle cx="-16" cy="0" r="5" fill="#1A1A1A"/>
    <ellipse cx="-18" cy="-2" rx="2" ry="1.5" fill="#F5C842" opacity="0.7"/>
    <ellipse cx="2" cy="-12" rx="12" ry="4.5" fill="#CECCFC" opacity="0.55" transform="rotate(-16, 2, -12)"/>
    <ellipse cx="8" cy="-9" rx="10" ry="3.8" fill="#CECCFC" opacity="0.42" transform="rotate(-9, 8, -9)"/>
    <line x1="14" y1="0" x2="22" y2="3" stroke="#5A3A28" stroke-width="1.5"/>
  </g>

  <!-- Guêpe 4 — sur nid -->
  <g transform="translate(648, 292) rotate(25)">
    <ellipse cx="0" cy="0" rx="10" ry="5" fill="#F5C842"/>
    <rect x="-6" y="-5" width="4" height="10" rx="1.5" fill="#1A1A1A" opacity="0.85"/>
    <rect x="1" y="-5" width="3.5" height="10" rx="1.5" fill="#1A1A1A" opacity="0.85"/>
    <circle cx="-12" cy="0" r="4" fill="#1A1A1A"/>
    <ellipse cx="1" cy="-9" rx="9" ry="3.5" fill="#CECCFC" opacity="0.5" transform="rotate(-14, 1, -9)"/>
    <ellipse cx="6" cy="-7" rx="8" ry="3" fill="#CECCFC" opacity="0.38" transform="rotate(-7, 6, -7)"/>
  </g>

  <!-- Guêpe 5 — petite -->
  <g transform="translate(625, 460) rotate(40)">
    <ellipse cx="0" cy="0" rx="8" ry="4" fill="#F5C842"/>
    <rect x="-5" y="-4" width="3.5" height="8" rx="1.5" fill="#1A1A1A" opacity="0.85"/>
    <rect x="0.5" y="-4" width="3" height="8" rx="1.5" fill="#1A1A1A" opacity="0.85"/>
    <circle cx="-10" cy="0" r="3.2" fill="#1A1A1A"/>
    <ellipse cx="1" cy="-7.5" rx="7.5" ry="2.8" fill="#CECCFC" opacity="0.5"/>
    <ellipse cx="5" cy="-6" rx="6" ry="2.2" fill="#CECCFC" opacity="0.38"/>
  </g>

  <!-- Trajectoires de vol -->
  <path d="M 808 285 Q 740 255 685 298 Q 655 316 648 292" fill="none" stroke="#635DDD" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.32"/>
  <path d="M 405 265 Q 465 228 528 256 Q 568 274 578 310" fill="none" stroke="#635DDD" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.32"/>
  <path d="M 625 460 Q 642 505 668 518 Q 698 530 716 518" fill="none" stroke="#635DDD" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.22"/>

  <!-- Poussières -->
  <circle cx="175" cy="355" r="2" fill="#C8B890" opacity="0.38"/>
  <circle cx="218" cy="425" r="1.5" fill="#C8B890" opacity="0.28"/>
  <circle cx="155" cy="485" r="2.5" fill="#C8B890" opacity="0.22"/>
  <circle cx="1025" cy="362" r="2" fill="#C8B890" opacity="0.38"/>
  <circle cx="982" cy="440" r="1.5" fill="#C8B890" opacity="0.28"/>
  <circle cx="1055" cy="488" r="2.5" fill="#C8B890" opacity="0.22"/>
  <circle cx="478" cy="505" r="1.5" fill="#C8B890" opacity="0.18"/>
  <circle cx="722" cy="522" r="2" fill="#C8B890" opacity="0.18"/>

  <!-- Sol combles -->
  <rect x="0" y="582" width="1200" height="48" fill="#D4C4A0" opacity="0.45"/>
  <rect x="0" y="582" width="1200" height="3.5" fill="#B8A880" opacity="0.38"/>
  <line x1="0" y1="596" x2="1200" y2="596" stroke="#A89870" stroke-width="1" opacity="0.28"/>
  <line x1="0" y1="612" x2="1200" y2="612" stroke="#A89870" stroke-width="1" opacity="0.22"/>
  <line x1="155" y1="582" x2="155" y2="630" stroke="#A89870" stroke-width="1.5" opacity="0.18"/>
  <line x1="325" y1="582" x2="325" y2="630" stroke="#A89870" stroke-width="1.5" opacity="0.18"/>
  <line x1="495" y1="582" x2="495" y2="630" stroke="#A89870" stroke-width="1.5" opacity="0.18"/>
  <line x1="665" y1="582" x2="665" y2="630" stroke="#A89870" stroke-width="1.5" opacity="0.18"/>
  <line x1="835" y1="582" x2="835" y2="630" stroke="#A89870" stroke-width="1.5" opacity="0.18"/>
  <line x1="1005" y1="582" x2="1005" y2="630" stroke="#A89870" stroke-width="1.5" opacity="0.18"/>

  <!-- Badge urgence -->
  <rect x="958" y="468" width="196" height="66" rx="12" fill="#F66C24" opacity="0.94"/>
  <rect x="958" y="468" width="196" height="66" rx="12" fill="none" stroke="#FF8B4A" stroke-width="1.5" opacity="0.45"/>
  <text x="978" y="510" font-size="26" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif">⚠️</text>
  <text x="1012" y="494" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="white" letter-spacing="0.4">N'INTERVENEZ</text>
  <text x="1012" y="514" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="white" letter-spacing="0.4">PAS SEUL</text>
</svg>
